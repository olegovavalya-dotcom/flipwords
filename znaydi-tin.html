<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Знайди Тінь — Комахи</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(180deg, #87CEEB 0%, #b8e4f7 38%, #6abf3e 38%, #5ab030 55%, #4a9020 100%);
    overflow-x: hidden;
  }

  .ad-top {
    display: flex; justify-content: center;
    background: #fff; padding: 4px 0;
    border-bottom: 2px solid #eee;
    position: relative; z-index: 20;
  }

  .cloud { position: absolute; background: white; border-radius: 50px; opacity: .9; pointer-events: none; }
  .cloud::before, .cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
  .c1 { width:110px;height:36px;top:70px;left:6%;animation:drift 9s ease-in-out infinite; }
  .c1::before{width:55px;height:55px;top:-28px;left:12px;} .c1::after{width:42px;height:42px;top:-18px;left:48px;}
  .c2 { width:80px;height:28px;top:90px;right:8%;animation:drift 13s ease-in-out infinite reverse; }
  .c2::before{width:40px;height:40px;top:-22px;left:8px;} .c2::after{width:32px;height:32px;top:-14px;left:36px;}
  @keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(14px)}}

  .sun {
    position:absolute;top:58px;right:18px;width:58px;height:58px;
    background:radial-gradient(circle,#FFD700,#FFA500);border-radius:50%;
    box-shadow:0 0 25px #FFD70080;animation:pulse 3s ease-in-out infinite;
    display:flex;align-items:center;justify-content:center;font-size:30px;z-index:2;
  }
  @keyframes pulse{0%,100%{box-shadow:0 0 25px #FFD70080}50%{box-shadow:0 0 45px #FFD700}}

  header { text-align:center; padding:12px 20px 8px; position:relative; z-index:10; }
  .title-box {
    display:inline-block; background:white;
    border:4px solid #FFA500; border-radius:30px;
    padding:7px 28px;
    box-shadow:0 6px 0 #FFA500,0 10px 20px rgba(0,0,0,.15);
  }
  .title-box h1 {
    font-family:'Baloo 2',cursive;
    font-size:clamp(26px,7vw,44px);
    color:#FFA500;text-shadow:2px 2px 0 #FF6B00;line-height:1;
  }
  .title-box .sub { font-size:13px;color:#5ab030;font-weight:800;letter-spacing:3px;text-transform:uppercase; }

  .scoreboard {
    display:flex;justify-content:center;gap:12px;
    margin:8px 20px;position:relative;z-index:10;
  }
  .pill {
    background:white;border-radius:20px;padding:5px 16px;
    font-size:16px;font-weight:800;
    box-shadow:0 4px 0 rgba(0,0,0,.1);
    display:flex;align-items:center;gap:5px;
  }
  .pill.ok  { color:#4CAF50;border:3px solid #4CAF50; }
  .pill.err { color:#f44336;border:3px solid #f44336; }
  .pill.lvl { color:#FF9800;border:3px solid #FF9800; }

  .prog-wrap {
    background:rgba(255,255,255,.4);border-radius:20px;
    height:10px;margin:0 20px 10px;overflow:hidden;position:relative;z-index:10;
  }
  .prog-bar {
    height:100%;background:linear-gradient(90deg,#FFD700,#FF6B00);
    border-radius:20px;transition:width .5s ease;width:0%;
  }

  .game-area { max-width:480px;margin:0 auto;padding:0 14px 120px;position:relative;z-index:5; }

  .insect-card {
    background:white;border-radius:24px;padding:16px 20px 12px;
    text-align:center;
    box-shadow:0 8px 0 rgba(0,0,0,.1),0 15px 30px rgba(0,0,0,.1);
    margin-bottom:14px;border:3px solid #e8f5e9;
    position:relative;overflow:hidden;
  }
  .insect-card::before {
    content:'';position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,#FF6B6B,#FFD93D,#6BCB77,#4D96FF,#FF6B6B);
    background-size:200%;animation:rainbow 3s linear infinite;
  }
  @keyframes rainbow{0%{background-position:0%}100%{background-position:200%}}

  .q-label { font-size:11px;letter-spacing:3px;color:#aaa;text-transform:uppercase;margin-bottom:6px; }
  .ins-big  {
    font-size:100px;line-height:1;display:block;
    animation:wobble 2s ease-in-out infinite;
    filter:drop-shadow(3px 6px 8px rgba(0,0,0,.25));
  }
  @keyframes wobble{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.05) translateY(-6px)}}
  .ins-name   { font-size:22px;font-weight:900;color:#333;margin-top:6px; }
  .ins-name-en{ font-size:13px;color:#999;font-weight:700; }

  .sh-label {
    text-align:center;font-size:11px;letter-spacing:3px;
    color:white;text-shadow:1px 1px 3px rgba(0,0,0,.5);
    text-transform:uppercase;margin-bottom:10px;font-weight:800;
  }

  .sh-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px; }

  /* Shadow button: white circle with silhouette inside */
  .sh-btn {
    border:3px solid rgba(255,255,255,.6);
    border-radius:50%;aspect-ratio:1;
    background:rgba(255,255,255,.15);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .2s,box-shadow .2s;
    box-shadow:0 6px 0 rgba(0,0,0,.2);
    padding:0;overflow:hidden;
    position:relative;
  }
  .sh-btn:hover  { transform:scale(1.09) translateY(-4px);box-shadow:0 12px 0 rgba(0,0,0,.2); }
  .sh-btn:active { transform:scale(0.93); }

  /* inner white disc */
  .sh-inner {
    width:88%;height:88%;border-radius:50%;
    background:white;
    display:flex;align-items:center;justify-content:center;
    transition:background .3s;
  }

  /* The emoji rendered as silhouette */
  .sh-emoji {
    font-size: 54px;
    line-height: 1;
    display: block;
    /* Render black silhouette using CSS filter */
    filter: brightness(0);
    transition: filter .3s;
  }

  /* States */
  .sh-btn.correct-pick { border-color:#4CAF50;animation:pop .5s ease; }
  .sh-btn.correct-pick .sh-inner { background:#e8ffe8; }
  .sh-btn.correct-pick .sh-emoji { filter:none; }

  .sh-btn.wrong-pick { animation:shake .4s ease; border-color:#f44336; }
  .sh-btn.wrong-pick .sh-inner { background:#ffe8e8; }

  .sh-btn.reveal-ok { border-color:#4CAF50; }
  .sh-btn.reveal-ok .sh-inner { background:#e8ffe8; }
  .sh-btn.reveal-ok .sh-emoji { filter:none; }

  .sh-btn.disabled { pointer-events:none; }

  @keyframes pop  { 0%{transform:scale(1)}40%{transform:scale(1.2)}70%{transform:scale(.95)}100%{transform:scale(1)} }
  @keyframes shake{ 0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)} }

  /* Feedback */
  .overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:99; }
  .overlay.show { display:block; }
  .feedback {
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:white;border-radius:30px;
    padding:28px 36px;text-align:center;z-index:100;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);
    min-width:240px;
  }
  .feedback.show { transform:translate(-50%,-50%) scale(1); }
  .fb-e  { font-size:54px;display:block;margin-bottom:8px; }
  .fb-t  { font-size:26px;font-weight:900;margin-bottom:4px; }
  .fb-t.g{ color:#4CAF50; } .fb-t.b{ color:#f44336; }
  .fb-s  { font-size:15px;color:#666; }

  /* Result */
  .result { display:none;position:fixed;inset:0;background:linear-gradient(135deg,#87CEEB,#b8e4f7);
    z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:30px; }
  .result.show { display:flex; }
  .res-box {
    background:white;border-radius:40px;padding:36px 44px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);
    max-width:300px;width:100%;
  }
  .re  { font-size:72px;margin-bottom:12px;display:block; }
  .rt  { font-family:'Baloo 2',cursive;font-size:34px;color:#FFA500;margin-bottom:6px; }
  .rs  { font-size:20px;font-weight:800;color:#333;margin-bottom:4px; }
  .rd  { font-size:14px;color:#888;margin-bottom:22px; }
  .btn-r {
    background:linear-gradient(135deg,#4CAF50,#45a049);color:white;
    border:none;border-radius:25px;padding:14px 36px;
    font-size:17px;font-weight:800;font-family:'Nunito',sans-serif;
    cursor:pointer;box-shadow:0 6px 0 #2d7a30;transition:all .2s;
    display:block;width:100%;margin-bottom:10px;
  }
  .btn-r:hover { transform:translateY(-3px);box-shadow:0 9px 0 #2d7a30; }

  /* Bottom ad */
  .ad-bottom {
    position:fixed;bottom:0;left:0;right:0;
    display:flex;justify-content:center;
    background:white;padding:4px 0;
    border-top:2px solid #eee;z-index:50;
  }

  .star {
    position:fixed;font-size:28px;pointer-events:none;z-index:150;
    animation:starFly 1s ease-out forwards;
  }
  @keyframes starFly{0%{transform:translateY(0) scale(0) rotate(0);opacity:1}100%{transform:translateY(-140px) scale(1.5) rotate(360deg);opacity:0}}
</style>
</head>
<body>

<!-- TOP AD -->
<div class="ad-top">
  <script>
    atOptions = {
      'key' : '575b6ac462cf76cc7d221d352a1f06b3',
      'format' : 'iframe',
      'height' : 50,
      'width' : 320,
      'params' : {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/575b6ac462cf76cc7d221d352a1f06b3/invoke.js"></script>
</div>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="sun">☀️</div>

<header>
  <div class="title-box">
    <h1>ЗНАЙДИ ТІНЬ</h1>
    <div class="sub">🐛 Комахи 🐝</div>
  </div>
</header>

<div class="scoreboard">
  <div class="pill ok">✓ <span id="correct">0</span></div>
  <div class="pill lvl">🎮 <span id="level">1</span> / 8</div>
  <div class="pill err">✗ <span id="wrong">0</span></div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="prog"></div></div>

<div class="game-area">
  <div class="insect-card">
    <div class="q-label">🔍 Знайди тінь цієї комахи</div>
    <span class="ins-big" id="ins">🐝</span>
    <div class="ins-name"    id="ins-name">Бджола</div>
    <div class="ins-name-en" id="ins-en">Bee</div>
  </div>

  <div class="sh-label">👇 Натисни на правильну тінь</div>
  <div class="sh-grid" id="grid"></div>
</div>

<div class="overlay"  id="overlay"></div>
<div class="feedback" id="feedback">
  <span class="fb-e" id="fb-e">🎉</span>
  <div class="fb-t"  id="fb-t">Правильно!</div>
  <div class="fb-s"  id="fb-s">Молодець!</div>
</div>

<div class="result" id="result">
  <div class="res-box">
    <span class="re" id="re">🏆</span>
    <div class="rt" id="rt">Чудово!</div>
    <div class="rs" id="rs">8 / 8</div>
    <div class="rd" id="rd">Всі тіні знайдені!</div>
    <button class="btn-r" onclick="startGame()">🔄 Грати ще!</button>
  </div>
</div>

<!-- BOTTOM AD -->
<div class="ad-bottom">
  <script>
    atOptions = {
      'key' : '575b6ac462cf76cc7d221d352a1f06b3',
      'format' : 'iframe',
      'height' : 50,
      'width' : 320,
      'params' : {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/575b6ac462cf76cc7d221d352a1f06b3/invoke.js"></script>
</div>

<script>
const insects=[
  {e:'🐝',n:'Бджола',   en:'Bee'},
  {e:'🦋',n:'Метелик',  en:'Butterfly'},
  {e:'🐛',n:'Гусінь',   en:'Caterpillar'},
  {e:'🐞',n:'Сонечко',  en:'Ladybug'},
  {e:'🦗',n:'Цвіркун',  en:'Cricket'},
  {e:'🦟',n:'Комар',    en:'Mosquito'},
  {e:'🐜',n:'Мурашка',  en:'Ant'},
  {e:'🦂',n:'Скорпіон', en:'Scorpion'},
  {e:'🕷️',n:'Павук',   en:'Spider'},
  {e:'🐌',n:'Равлик',   en:'Snail'},
  {e:'🪲',n:'Жук',      en:'Beetle'},
  {e:'🪳',n:'Таргани',  en:'Cockroach'},
];

let queue=[],current=null,correct=0,wrong=0,round=0;
const TOTAL=8;
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

function startGame(){
  correct=0;wrong=0;round=0;
  queue=shuffle(insects).slice(0,TOTAL);
  $('correct').textContent=0;
  $('wrong').textContent=0;
  $('result').classList.remove('show');
  nextRound();
}

function nextRound(){
  if(round>=TOTAL){showResult();return;}
  current=queue[round];
  $('ins').textContent=current.e;
  $('ins-name').textContent=current.n;
  $('ins-en').textContent=current.en;
  $('level').textContent=round+1;
  $('prog').style.width=(round/TOTAL*100)+'%';

  const others=shuffle(insects.filter(i=>i.e!==current.e)).slice(0,5);
  const options=shuffle([current,...others]);
  const grid=$('grid');
  grid.innerHTML='';
  options.forEach(ins=>{
    const btn=document.createElement('button');
    btn.className='sh-btn';
    btn.dataset.e=ins.e;
    btn.innerHTML=`<div class="sh-inner"><span class="sh-emoji">${ins.e}</span></div>`;
    btn.onclick=()=>pick(ins,btn);
    grid.appendChild(btn);
  });
}

function pick(chosen,btn){
  document.querySelectorAll('.sh-btn').forEach(b=>b.classList.add('disabled'));
  if(chosen.e===current.e){
    correct++;$('correct').textContent=correct;
    btn.classList.add('correct-pick');
    feedback(true);spawnStars(btn);
  } else {
    wrong++;$('wrong').textContent=wrong;
    btn.classList.add('wrong-pick');
    document.querySelectorAll('.sh-btn').forEach(b=>{
      if(b.dataset.e===current.e) b.classList.add('reveal-ok');
    });
    feedback(false);
  }
  setTimeout(()=>{hideFb();round++;nextRound();},1900);
}

function feedback(ok){
  const p=['Чудово!','Молодець!','Супер!','Відмінно!','Браво!'];
  const f=['Не здавайся!','Майже!','Спробуй ще!'];
  $('fb-e').textContent=ok?['🎉','⭐','🏆','🌟','🎊'][~~(Math.random()*5)]:'😅';
  const t=$('fb-t');
  t.textContent=ok?p[~~(Math.random()*p.length)]:f[~~(Math.random()*f.length)];
  t.className='fb-t '+(ok?'g':'b');
  $('fb-s').textContent=ok?`Це ${current.n}! ✅`:`Правильно — ${current.n}`;
  $('overlay').classList.add('show');
  $('feedback').classList.add('show');
}

function hideFb(){
  $('feedback').classList.remove('show');
  $('overlay').classList.remove('show');
}

function spawnStars(el){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  ['⭐','🌟','✨','💫'].forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='star';d.textContent=s;
    d.style.left=(cx+(Math.random()-.5)*70)+'px';
    d.style.top=cy+'px';
    d.style.animationDelay=(i*.1)+'s';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1200);
  });
}

function showResult(){
  $('prog').style.width='100%';
  const pct=Math.round(correct/TOTAL*100);
  $('result').classList.add('show');
  if(pct===100){$('re').textContent='🏆';$('rt').textContent='Ідеально!';$('rd').textContent='Всі тіні знайдені! 🌟';}
  else if(pct>=75){$('re').textContent='⭐';$('rt').textContent='Чудово!';$('rd').textContent='Ти дуже уважний! 💪';}
  else{$('re').textContent='💪';$('rt').textContent='Молодець!';$('rd').textContent='Практикуйся ще! 🐛';}
  $('rs').textContent=correct+' / '+TOTAL+' правильно';
}

function $(id){return document.getElementById(id);}
startGame();
</script>
</body>
</html>
